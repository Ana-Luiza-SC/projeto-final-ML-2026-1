services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-8}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-true}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
