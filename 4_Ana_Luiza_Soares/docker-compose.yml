services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-8}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-true}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/estudaunb.db}
      AUTH_SECRET: ${AUTH_SECRET:-local-development-change-me}
      EMAIL_TESTE: ${EMAIL_TESTE:-teste@example.invalid}
      SENHA_TESTE: ${SENHA_TESTE:-altere-esta-senha}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - estudaunb_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-${VITE_API_BASE_URL:-http://localhost:8000}}
    ports:
      - "5173:5173"
    depends_on:
      - backend


volumes:
  estudaunb_data:
