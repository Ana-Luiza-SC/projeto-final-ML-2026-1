services:
  - type: web
    name: estudaunb-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: EMAIL_TESTE
        sync: false
      - key: SENHA_TESTE
        sync: false
      - key: ALLOW_REGISTRATION
        value: true
      - key: LLM_PROVIDER
        value: google
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: LLM_TIMEOUT_SECONDS
        value: 8
      - key: LLM_FALLBACK_ENABLED
        value: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: estudaunb-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
